name: Deploy Doxygen to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Doxygen
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install documentation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes doxygen graphviz ninja-build

      - name: Configure CMake
        run: cmake --preset docs

      - name: Build documentation
        run: cmake --build --preset docs --target docs

      - name: Verify documentation artifact
        run: |
          test -f build/docs/target/html/index.html
          test -f build/docs/target/html/md_intro__cn.html
          test -f build/docs/target/html/assets/banner.png
          file build/docs/target/html/assets/banner.png | grep 'PNG image data'
          test "$(wc -c < build/docs/target/html/assets/banner.png)" -gt 100000

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/target/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v4
